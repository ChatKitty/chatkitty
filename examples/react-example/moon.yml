type: 'application'

workspace:
  inheritedTasks:
    exclude: ['typecheck']

toolchain:
  typescript:
    disabled: true

fileGroups:
  app:
    - 'public/index.html'

tasks:
  build:
    command: "tsc -b && vite build"
  install:
    command: 'pnpm install'
  dev:
    command: 'vite --host'
    local: true
